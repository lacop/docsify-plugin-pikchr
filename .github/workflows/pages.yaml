name: Pages

on:
  push:
    branches:
      - main
  # YOLO mode for testing page changes without merging the PR.
  # pull_request:
  #   branches:
  #     - main

jobs:
  deploy-pages:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: example

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
